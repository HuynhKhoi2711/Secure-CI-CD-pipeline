env:
  contexts:
  - name: "nodegoat-staging-context"
    urls:
    - "${TARGET_URL}" # Tự động nhận URL từ tham số target của file deploy.yml truyền sang
    includeCmds: true
    excludeCmds: []
    
    # CẤU HÌNH AUTHENTICATION: ĐĂNG NHẬP TỰ ĐỘNG VÀO NODEGOAT
    authentication:
      method: "form"
      parameters:
        loginUrl: "${TARGET_URL}/login"
        loginRequestData: "username={%username%}&password={%password%}"
      verification:
        method: "response"
        loggedOutRegex: '.*href="/login".*'
        loggedInRegex: '.*href="/logout".*'
    
    users:
    - name: "dast-test-user"
      credentials:
        username: "${TEST_USER}"
        password: "${TEST_PASSWORD}"

  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true

jobs:
- type: passiveScan-config
  parameters:
    maxAlertsPerRule: 10
    scanOnlyInContext: true

# BƯỚC CRAWL: Tìm kiếm tất cả đường link, tính năng ẩn sau khi đăng nhập thành công
- type: spider
  parameters:
    context: "nodegoat-staging-context"
    user: "dast-test-user"
    maxDuration: 5 # Giới hạn 5 phút quét để tránh bị treo pipeline máy ảo

# BƯỚC TẤN CÔNG THỬ NGHIỆM (ACTIVE SCAN): Dò lỗi Injection, XSS, Broken Auth
- type: activeScan
  parameters:
    context: "nodegoat-staging-context"
    user: "dast-test-user"
    policy: "Light" 
    maxRuleDurationInMins: 2

# XUẤT BÁO CÁO FORMAT JSON ĐỂ PIPELINE LƯU TRỮ VÀ HIỂN THỊ
- type: report
  parameters:
    template: "json-summary"
    reportDir: "/zap/wrk"
    reportFile: "zap-report"